{% extends "base/base.html" %}

{% load static %}
<link rel="stylesheet" href="{% static 'customers/detail.css' %}">

{% block main %}
<div>
    <h2>{{ customer.username }}</h2>
    <hr/>
    <table id="customer-desc" class="no-border-table fixed-table">
        <tr>
            <th>Name</th>
            <td>{{ customer.display_name }}</td>
        </tr>
        <tr>
            <th>Username</th>
            <td>{{ customer.username }}</td>
        </tr>
        <tr>
            <th>Email</th>
            <td>{{ customer.email }}</td>
        </tr>
        <tr>
            <th>Phone</th>
            <td>{{ customer.phone_nr }}</td>
        </tr>
    </table>
</div>
{% endblock %}
