{% extends "base/base.html" %}

{% block main %}
    {% load static %}
    <link rel="stylesheet" href="{% static 'generic/card.css' %}">

    <div class="card">
        <a href="{% url 'customers:index' %}">Go Back</a>
        <h2>{{ customer.username }}'s information</h2>
        <hr/>
        <table id="customer-desc">
            <tr>
                <th>Name:</th>
                <td>{{ customer.display_name }}</td>
            </tr>
            <tr>
                <th>Username:</th>
                <td>{{ customer.username }}</td>
            </tr>
            <tr>
                <th>Email:</th>
                <td>{{ customer.email }}</td>
            </tr>
            <tr>
                <th>Phone:</th>
                <td>{{ customer.phone_number }}</td>
            </tr>
        </table>
    </div>
{% endblock %}
