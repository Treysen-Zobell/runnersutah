{% extends "base/base.html" %}

{% block head %}
    {% load static %}
    <link rel="stylesheet" href="{% static 'generic/card.css' %}">
{#    <link rel="stylesheet" href="{% static 'customers/detail.css' %}">#}
{% endblock %}

{% block main %}
<div class="card">
    <a href="{% url 'customers:customer_list' %}">Go Back</a>
    <h2>{{ customer.username }}</h2>
    <hr/>
    <table id="customer-desc">
        <tr>
            <th>Name:</th>
            <td>{{ customer.display_name }}</td>
        </tr>
        <tr>
            <th>Username:</th>
            <td>{{ customer.username }}</td>
        </tr>
        <tr>
            <th>Email:</th>
            <td>{{ customer.email }}</td>
        </tr>
        <tr>
            <th>Phone:</th>
            <td>{{ customer.phone_nr }}</td>
        </tr>
    </table>
</div>
{% endblock %}
